<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Police Radio</title>

<style>
/* 🚫 FIX TEXT HIGHLIGHTING */
* {
  -webkit-user-select: none;
  -ms-user-select: none;
  user-select: none;
}

body {
  background: #070a0f;
  color: #00ff9c;
  font-family: monospace;
  text-align: center;
  padding-top: 70px;
}

h1 {
  margin-bottom: 20px;
}

button {
  padding: 18px 35px;
  font-size: 18px;
  background: #111;
  border: 2px solid #00ff9c;
  color: #00ff9c;
  border-radius: 10px;

  /* 🚫 FIX iPhone long press menu */
  -webkit-touch-callout: none;
  touch-action: manipulation;
}

button.active {
  background: #00ff9c;
  color: #000;
}

#status {
  margin-top: 20px;
  font-size: 14px;
}
</style>
</head>

<body>

<h1>🚓 AI Dispatch Radio</h1>

<button id="ptt">HOLD TO TALK (PTT)</button>
<div id="status">Idle</div>

<!-- Sounds -->
<audio id="beepOn" src="https://dl.sndup.net/7ch4v/push_02.wav"></audio>
<audio id="beepOff" src="https://www.soundjay.com/button/beep-10.wav"></audio>

<script>
const btn = document.getElementById("ptt");
const status = document.getElementById("status");

let recognition;
let isTalking = false;

// 🎤 Speech recognition
if ('webkitSpeechRecognition' in window) {
  recognition = new webkitSpeechRecognition();
  recognition.continuous = false;
  recognition.interimResults = false;
} else {
  alert("Speech recognition not supported on this device.");
}

// 🚓 START PTT
function startPTT() {
  if (isTalking) return;
  isTalking = true;

  btn.classList.add("active");
  document.getElementById("beepOn").play();

  status.innerText = "Transmitting...";

  try {
    recognition.start();
  } catch (e) {
    console.log("Recognition already running");
  }
}

// 🚓 STOP PTT
function stopPTT() {
  if (!isTalking) return;
  isTalking = false;

  btn.classList.remove("active");
  document.getElementById("beepOff").play();

  recognition.stop();
  status.innerText = "Processing...";
}

// 📱 MOBILE TOUCH FIX
btn.addEventListener("touchstart", (e) => {
  e.preventDefault();
  startPTT();
});

btn.addEventListener("touchend", (e) => {
  e.preventDefault();
  stopPTT();
});

// 💻 DESKTOP SUPPORT
btn.addEventListener("mousedown", startPTT);
btn.addEventListener("mouseup", stopPTT);

// ⌨️ OPTIONAL SPACEBAR PTT
document.addEventListener("keydown", (e) => {
  if (e.code === "Space") startPTT();
});

document.addEventListener("keyup", (e) => {
  if (e.code === "Space") stopPTT();
});

// 🎤 RESULT HANDLER
recognition.onresult = async (event) => {
  const text = event.results[0][0].transcript;
  status.innerText = "You: " + text;

  const response = await fetchAI(text);
  speak(response);
};

// 🤖 GEMINI AI DISPATCH
async function fetchAI(input) {
  const apiKey = "AIzaSyBYTIHwIqXLIoDHtN9u7UkI-3p9QE_qLMA";

  const res = await fetch(
    "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + apiKey,
    {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        contents: [{
          parts: [{
            text: `You are a police dispatcher.
Keep responses under 12 words.
Use short radio communication.

Always respond like police radio traffic.

User: ${input}`
          }]
        }]
      })
    }
  );

  const data = await res.json();

  try {
    return data.candidates[0].content.parts[0].text;
  } catch {
    return "Dispatch unavailable. Repeat last transmission.";
  }
}

// 🔊 SPEECH OUTPUT
function speak(text) {
  status.innerText = "Dispatch: " + text;

  const utterance = new SpeechSynthesisUtterance(text);
  utterance.rate = 0.9;
  utterance.pitch = 0.75;

  speechSynthesis.speak(utterance);
}
</script>

</body>
</html>
